<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Colegio Concepción Linares</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="bg-login">

<div class="tarjeta-login">
    <img src="{{ url_for('static', filename='img/logo.png') }}" alt="Logo Colegio" class="logo-login">

    <h2 class="titulo-principal" style="font-size: 1.8rem;">SISTEMA DE INVENTARIO</h2>
    <p class="subtitulo-principal">Liceo Bicentenario de Excelencia<br>Colegio Concepción Linares</p>

    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
    {% for category, message in messages %}
    <div class="alert alert-danger rounded-3 fw-bold shadow-sm" role="alert">
        {{ message }}
    </div>
    {% endfor %}
    {% endif %}
    {% endwith %}

    <form action="/login" method="POST">
        <input type="text" name="username" class="form-control form-control-custom" placeholder="Nombre de Usuario" required>
        <input type="password" name="password" class="form-control form-control-custom" placeholder="Contraseña" required>

        <button type="submit" class="btn btn-institucional mt-3">INGRESAR AL SISTEMA</button>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
